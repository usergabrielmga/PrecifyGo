<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Orçamento</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #000;
      margin: 40px;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid #000;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 20px;
      margin: 0;
      font-weight: normal;
      letter-spacing: 1px;
    }

    .header .right {
      text-align: right;
      font-size: 11px;
    }

    .logo {
      max-height: 60px;
      margin-bottom: 5px;
    }

    /* ===== SECTIONS ===== */
    .section {
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info {
      line-height: 1.6;
    }

    /* ===== TABLE ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    thead th {
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid #000;
      padding: 8px 0;
      text-align: left;
    }

    tbody td {
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
    }

    td.center {
      text-align: center;
    }

    td.right {
      text-align: right;
    }

    /* ===== TOTAL ===== */
    .total-box {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    .total {
      font-size: 13px;
      font-weight: bold;
      border-top: 1px solid #000;
      padding-top: 8px;
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 40px;
      font-size: 10px;
      text-align: center;
      border-top: 1px solid #000;
      padding-top: 10px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>ORÇAMENTO</h1>
    </div>

    <div class="right">
      <img src="{{logo}}" class="logo" /><br>
      Nº {{numero}}
    </div>
  </div>

  <!-- EMISSOR -->
  <div class="section">
    <div class="section-title">Emissor</div>
    <div class="info">
      <strong>{{emissor_nome}}</strong><br>
      {{emissor_email}}<br>
      {{emissor_telefone}}
    </div>
  </div>

  <!-- CLIENTE -->
  <div class="section">
    <div class="section-title">Cliente</div>
    <div class="info">
      <strong>{{cliente_nome}}</strong><br>
      {{cliente_email}}<br>
      {{cliente_telefone}}
    </div>
  </div>

  <!-- ITENS -->
  <div class="section">
    <div class="section-title">Itens</div>

    <table>
      <thead>
        <tr>
          <th>Produto / Serviço</th>
          <th class="center">Qtd</th>
          <th class="right">Unitário</th>
          <th class="right">Total</th>
        </tr>
      </thead>
      <tbody>
        {{items}}
      </tbody>
    </table>
  </div>

  <!-- TOTAL -->
  <div class="total-box">
    <div class="total">
      Total: R$ {{total}}
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Documento gerado automaticamente
  </div>

</body>
</html>
